---
name:  mds
title: Multidimensional Scaling Plot
jrs:   '1.1'
refs: snowCluster
items:
    - name: instructions
      title: Instructions
      type: Html
      visible: True

    - name: stressNote
      title: Stress value
      type: Preformatted
      visible: false

    - name:  plot
      title: MDS Plot
      type:  Image
      requiresData: true
      visible: (plot)
      renderFun: .plot
      clearWith:
        - vars
        - labels
        - metric

    - name:  plot1
      title: 'K-means Plot'
      type:  Image
      requiresData: true
      visible: (plot1)
      renderFun: .plot1
      clearWith:
        - vars
        - labels
        - k

    - name:  plot2
      title: '3D Scatter Plot'
      type:  Image
      requiresData: true
      visible: (plot2)
      renderFun: .plot2
      clearWith:
        - xlab
        - ylab
        - zlab
        - metric

    - name:  plot3
      title: 'Shepard Diagram'
      type:  Image
      requiresData: true
      visible: (plot3)
      renderFun: .plot3
      clearWith:
        - vars
        - labels
        - metric

    - name:  text
      title: ''
      type:  Preformatted

    - name: clust
      title: Clustering
      type: Output
      varTitle: Clustering
      measureType: nominal
      clearWith:
        - vars
        - labels
        - k
        - metric

...
