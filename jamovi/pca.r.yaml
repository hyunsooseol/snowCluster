---
name:  pca
title: Dimension Reduction Plot
jrs:   '1.1'
refs: snowCluster
items:
    - name: instructions
      title: Instructions
      type: Html
      visible: True
      
    - name: eigen
      title: 'Eigenvalues'
      visible: (mode:simple && eigen)
      type: Table
      clearWith:
        - mode
        - vars
        - labels

      columns:
        - name: comp
          title: 'Component'
          type: 'text'
        - name: eigen
          title: Eigenvalue
          type: number
        - name: varProp
          title: '% of Variance'
          type: number
        - name: varCum
          title: 'Cumulative %'
          type: number

    - name:  plot
      title: Variable Contributions
      type:  Image
      requiresData: true
      refs: factoextra
      visible: (mode:simple && plot)
      renderFun: .plot
      clearWith:
        - mode
        - vars
        - labels

    - name:  plot1
      title: Individual Plot
      type:  Image
      requiresData: true
      refs: factoextra
      visible: (mode:simple && plot1)
      renderFun: .plot1
      clearWith:
        - mode
        - vars
        - labels
        - pcaLabels

    - name:  plot2
      title: Biplot
      type:  Image
      requiresData: true
      refs: factoextra 
      visible: (mode:simple && plot2)
      renderFun: .plot2
      clearWith:
        - mode
        - vars
        - labels

    - name:  plot3
      title: Individuals by groups
      type:  Image
      requiresData: true
      refs: factoextra
      visible: (mode:complex && plot3)
      renderFun: .plot3
      clearWith:
        - mode
        - vars1
        - facs

    - name:  plot4
      title: PCA-Biplot
      type:  Image
      requiresData: true
      refs: factoextra
      visible: (mode:complex && plot4)
      renderFun: .plot4
      clearWith:
        - mode
        - vars1
        - facs

    - name:  plot5
      title: UMAP Plot
      type:  Image
      requiresData: true
      refs: uwot
      visible: (mode:umap && umapPlot)
      renderFun: .plot5
      clearWith:
        - mode
        - vars2
        - facs2
        - labels2
        - umapStandardize
        - umapNeighbors
        - umapMinDist
        - umapMetric
        - umapSeed
        - umapLabels
        - umapLegend
...
