title: Dimension Reduction Plot
name: pca
jus: '3.0'
stage: 0
compilerMode: tame
children:
  - type: ModeSelector
    name: mode
    stretchFactor: 1
    children:
      - type: Content
        name: simple
        children:
          - type: LayoutBox
            margin: large
            stretchFactor: 1
            children:
              - type: VariableSupplier
                persistentItems: false
                stretchFactor: 1
                permitted:
                  - numeric
                  - factor
                  - id
                children:
                  - type: TargetLayoutBox
                    label: Variables
                    children:
                      - type: VariablesListBox
                        name: vars
                        isTarget: true
                  - type: TargetLayoutBox
                    children:
                      - type: VariablesListBox
                        name: labels
                        isTarget: true
                        maxItemCount: 1
          - type: LayoutBox
            margin: large
            stretchFactor: 1
            children:
              - type: LayoutBox
                margin: large
                cell:
                  column: 0
                  row: 0
                stretchFactor: 1
                children:
                  - type: Label
                    label: 'Table'
                    children:
                      - type: CheckBox
                        name: eigen
              - type: LayoutBox
                margin: large
                cell:
                  column: 1
                  row: 0
                stretchFactor: 1
                children:
                  - type: Label
                    label: 'Plots'
                    children:
                      - type: CheckBox
                        name: plot
                      - type: CheckBox
                        name: plot1
                        children:
                          - type: CheckBox
                            name: pcaLabels
                            enable: (plot1)
                      - type: CheckBox
                        name: plot2

      - type: Content
        name: complex
        children:
          - type: VariableSupplier
            persistentItems: false
            stretchFactor: 1
            children:
              - type: TargetLayoutBox
                label: Variables
                children:
                  - type: VariablesListBox
                    name: vars1
                    isTarget: true
              - type: TargetLayoutBox
                label: Factor(Required)
                children:
                  - type: VariablesListBox
                    name: facs
                    maxItemCount: 1
                    isTarget: true
          - type: LayoutBox
            margin: large
            stretchFactor: 1
            children:
              - type: LayoutBox
                margin: large
                cell:
                  column: 0
                  row: 0
                stretchFactor: 1
                children:
                  - type: Label
                    label: "Plots"
                    children:
                      - type: CheckBox
                        name: plot3
                      - type: CheckBox
                        name: plot4

      - type: Content
        name: umap
        children:
          - type: LayoutBox
            margin: large
            stretchFactor: 1
            children:
              - type: VariableSupplier
                persistentItems: false
                stretchFactor: 1
                permitted:
                  - numeric
                  - factor
                  - id
                children:
                  - type: TargetLayoutBox
                    label: Variables
                    children:
                      - type: VariablesListBox
                        name: vars2
                        isTarget: true
                  - type: TargetLayoutBox
                    label: Factor (Optional)
                    children:
                      - type: VariablesListBox
                        name: facs2
                        isTarget: true
                        maxItemCount: 1
                  - type: TargetLayoutBox
                    label: 'Case label (Optional)'
                    children:
                      - type: VariablesListBox
                        name: labels2
                        isTarget: true
                        maxItemCount: 1

          - type: LayoutBox
            margin: large
            stretchFactor: 1
            children:
              - type: LayoutBox
                margin: large
                cell:
                  column: 1
                  row: 0
                stretchFactor: 1
                children:
                  - type: Label
                    label: "Plot"
                    children:
                      - type: CheckBox
                        name: umapPlot
                        children:
                          - type: CheckBox
                            name: umapLabels
                            enable: (umapPlot)
                          - type: CheckBox
                            name: umapLegend
                            enable: (umapPlot)

              - type: LayoutBox
                margin: large
                cell:
                  column: 0
                  row: 0
                stretchFactor: 1
                children:
                  - type: Label
                    label: "Options"
                    children:
                      - type: CheckBox
                        name: umapStandardize
                      - type: TextBox
                        name: umapNeighbors
                        format: number
                      - type: TextBox
                        name: umapMinDist
                        format: number
                      - type: ComboBox
                        name: umapMetric
                      - type: TextBox
                        name: umapSeed
                        format: number