---
name:  pca
title: Dimension Reduction Plot
menuGroup: snowCluster
menuSubgroup: Cluster Plot
version: '1.0.0'
jas: '1.2'

options:
    - name: data
      type: Data
      description:
          R: >
            The data as a data frame.

    - name: mode
      title: ""
      type: List
      options:
            - name: simple
              title: 'PCA Plot'
            - name: complex
              title: 'Group Plot'
            - name: umap
              title: 'UMAP Plot'
      default: simple

    - name: labels
      title: Case label (Optional)
      type: Variable
      suggested:
         - nominal
      permitted:
         - id
         - factor

    - name: vars
      title: Variables
      type: Variables
      suggested:
         - continuous
      permitted:
        - numeric  

    - name: pcaLabels
      title: Show case labels
      type: Bool
      default: FALSE

    - name: eigen
      title: Eigenvalues
      type: Bool
      default: TRUE

    - name: plot
      title: Variable contributions 
      type: Bool
      default: FALSE
      
    - name: plot1
      title: Individual plot 
      type: Bool
      default: FALSE

    - name: plot2
      title: Biplot 
      type: Bool
      default: FALSE
  
    - name: vars1
      title: Variables
      type: Variables
      suggested:
         - continuous
      permitted:
        - numeric  

    - name: facs
      title: Factor(Required)
      type: Variable
      suggested:
         - nominal
      permitted:
        - factor
        
    - name: plot3
      title: Individuals by groups
      type: Bool
      default: FALSE
      
    - name: plot4
      title: PCA-Biplot
      type: Bool
      default: FALSE        

    - name: vars2
      title: Variables
      type: Variables
      suggested:
         - continuous
      permitted:
        - numeric

    - name: facs2
      title: Factor (Optional)
      type: Variable
      suggested:
         - nominal
      permitted:
        - factor

    - name: labels2
      title: 'Case label (Optional)'
      type: Variable
      suggested:
         - nominal
      permitted:
         - id
         - factor

    - name: umapPlot
      title: UMAP plot
      type: Bool
      default: TRUE

    - name: umapStandardize
      title: Standardize variables
      type: Bool
      default: TRUE

    - name: umapNeighbors
      title: Number of neighbors
      type: Integer
      min: 2
      max: 100
      default: 15

    - name: umapMinDist
      title: Minimum distance
      type: Number
      min: 0
      max: 1
      default: 0.1

    - name: umapMetric
      title: Distance metric
      type: List
      options:
            - name: euclidean
              title: Euclidean
            - name: manhattan
              title: Manhattan
            - name: cosine
              title: Cosine
      default: euclidean

    - name: umapSeed
      title: Random seed
      type: Integer
      min: 1
      max: 999999
      default: 1234

    - name: umapLabels
      title: 'Show case labels'
      type: Bool
      default: FALSE

    - name: umapLegend
      title: Show group legend
      type: Bool
      default: FALSE

...
